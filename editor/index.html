<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Draft Editor</title>
  <link rel="stylesheet" href="/media/css/draft-editor.css">
  <link rel="stylesheet" href="/media/vendor/prism/prism.min.css">
  <link rel="stylesheet" href="/media/vendor/prism/prism-dark.min.css">
  <link rel="stylesheet" href="/media/vendor/prism/prism-monokai.min.css">
  <script src="/media/vendor/prism/prism.min.js" data-manual></script>
  <script src="/media/vendor/prism/prism-autoloader.min.js"></script>
  <script>
    if (window.Prism && Prism.plugins && Prism.plugins.autoloader) {
      Prism.plugins.autoloader.languages_path = '/media/vendor/prism/';
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      background: radial-gradient(circle at 8% 2%, #f0ebe1, #f7f6f2 45%);
      color: #1c1b19;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }
    .bar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -28px -20px 20px;
      padding: 14px 20px;
      background: rgba(247, 246, 242, 0.94);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #e2ddd3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .bar h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6d6a64;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .actions button {
      border: 1px solid #0f5f4f;
      background: #0d6a57;
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .actions button.secondary {
      background: transparent;
      color: #0d6a57;
      border-color: #9db8b1;
    }
    input[type="color"] {
      width: 34px; height: 34px; border: 1px solid #c4c0b8; border-radius: 8px;
      padding: 2px; background: #fff; cursor: pointer;
    }
    .status {
      font-size: 13px; color: #6d6a64; min-height: 20px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .hint {
      margin-top: 18px; color: #6d6a64; font-size: 13px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <h1>Local Draft Editor</h1>
      <div class="actions">
        <input id="tagsInput" type="text" placeholder="tag1, tag2" title="Tags" style="min-width:140px;border:1px solid #9db8b1;border-radius:999px;padding:7px 12px;font-size:13px;background:transparent;color:#0d6a57;">
        <button class="secondary" id="copyBtn" type="button">Copy Org</button>
        <button class="secondary" id="previewBtn" type="button">Preview</button>
        <button class="secondary" id="saveDraftBtn" type="button">Save Draft</button>
        <button id="publishBtn" type="button">Publish to posts/</button>
        <button class="secondary" id="readingModeBtn" type="button">Highlight Mode</button>
        <input id="readingColor" type="color" value="#dff0df" title="Highlight color">
      </div>
    </div>

    <div class="status" id="status">This page exists only in local doorman mode.</div>

    <article id="editor-sheet" class="sheet de-sheet">
      <div id="title" class="de-title" contenteditable="true" spellcheck="true"></div>
      <div id="body" class="de-body" contenteditable="true" spellcheck="true"></div>
      <div class="hint">Type <b>/</b> for commands, <b>##</b> for heading, <b>&gt;</b> for quote, <b>```</b> for code. Hover a block for the <b>+</b> menu.</div>
    </article>

    <article id="preview" class="sheet de-sheet" style="display:none;">
      <h1 id="preview-title" class="de-title"></h1>
      <div id="preview-body" class="de-body"></div>
    </article>
  </div>

  <script src="/media/js/draft-editor.js"></script>
  <script>
    const editor = new DraftEditor({
      titleEl: '#title',
      bodyEl: '#body',
      statusEl: '#status',
    });

    const params = new URLSearchParams(window.location.search);
    const draftSlug = (params.get('draft') || '').trim();
    const postSlug = (params.get('post') || '').trim();
    const tagsInput = document.getElementById('tagsInput');

    function updateTagsFromInput() {
      editor.setTags((tagsInput.value || '').split(',').map(t => t.trim()).filter(Boolean));
    }
    tagsInput.addEventListener('input', updateTagsFromInput);
    tagsInput.addEventListener('change', updateTagsFromInput);

    const previewBtn = document.getElementById('previewBtn');
    const preview = document.getElementById('preview');
    const previewTitle = document.getElementById('preview-title');
    const previewBody = document.getElementById('preview-body');
    const editorSheet = document.getElementById('editor-sheet');

    function updatePreview() {
      previewTitle.textContent = document.getElementById('title').innerText;
      previewBody.innerHTML = editor.renderOrgToHtml(editor.getOrgBody());
      if (window.Prism) Prism.highlightAll();
    }

    previewBtn.addEventListener('click', () => {
      const showing = preview.style.display !== 'none';
      if (showing) {
        preview.style.display = 'none';
        editorSheet.style.display = '';
        previewBtn.textContent = 'Preview';
        editor.focus();
      } else {
        updatePreview();
        editorSheet.style.display = 'none';
        preview.style.display = '';
        previewBtn.textContent = 'Edit';
      }
    });

    document.getElementById('saveDraftBtn').addEventListener('click', () => { updateTagsFromInput(); editor.saveDoc('draft'); });
    document.getElementById('publishBtn').addEventListener('click', () => { updateTagsFromInput(); editor.saveDoc('publish'); });
    document.getElementById('copyBtn').addEventListener('click', () => editor.copyOrg());

    editor.opts.onChange = () => {
      if (preview.style.display !== 'none') updatePreview();
    };

    const readingModeBtn = document.getElementById('readingModeBtn');
    const readingColor = document.getElementById('readingColor');
    readingModeBtn.addEventListener('click', () => {
      document.getElementById('body').classList.toggle('de-reading-highlight');
      editor.setStatus(document.getElementById('body').classList.contains('de-reading-highlight') ? 'Highlight mode enabled.' : 'Highlight mode disabled.');
    });
    readingColor.addEventListener('input', () => {
      document.getElementById('body').style.setProperty('--de-reading-hl', readingColor.value);
    });

    (async function init() {
      if (postSlug) {
        await editor.loadDraftFromQuery(postSlug, 'post');
      } else if (draftSlug) {
        await editor.loadDraftFromQuery(draftSlug, 'draft');
      } else {
        editor.ensureTrailingParagraph();
        editor.refreshBlockStates();
      }
      tagsInput.value = editor.getTags().join(', ');
      document.getElementById('body').style.setProperty('--de-reading-hl', readingColor.value);
    })();
  </script>
</body>
</html>
