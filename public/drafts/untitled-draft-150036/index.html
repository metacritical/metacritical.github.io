    saveState.classList.remove('is-saving', 'is-dirty', 'is-saved', 'is-error');
    if (state) saveState.classList.add(state);
    saveState.textContent = label;
  }

  function markDirty(){
    dirty = true;
    changeVersion += 1;
    setSaveState('is-dirty', 'Unsaved changes');
    history.debouncedPush('edit', 350);
  }

  function normalizeTag(tag){
    return (tag || '').trim().toLowerCase().replace(/[^a-z0-9-_ ]+/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'');
  }

  function askInput(opts){
    return new Promise((resolve)=>{
      const o = opts || {};
      const prior = document.activeElement;
      inputTitle.textContent = o.title || 'Input';
      inputLabel.textContent = o.label || 'Value';
      inputField.placeholder = o.placeholder || '';
      inputField.value = o.value || '';
      inputOk.textContent = o.okText || 'OK';
      inputCancel.textContent = o.cancelText || 'Cancel';
      inputModal.hidden = false;

      const finish = (val)=>{
        inputModal.hidden = true;
        inputField.value = '';
        inputField.placeholder = '';
        inputModal.removeEventListener('click', onBackdrop);
        inputField.removeEventListener('keydown', onKeyDown);
        inputOk.removeEventListener('click', onOk);
        inputCancel.removeEventListener('click', onCancel);
        if (prior && prior.focus) prior.focus();
        resolve(val);
      };
      const onOk = ()=> finish(inputField.value.trim());
      const onCancel = ()=> finish(null);
      const onBackdrop = (e)=> { if (e.target === inputModal) finish(null); };
      const onKeyDown = (e)=>{
        if (e.key === 'Enter') { e.preventDefault(); onOk(); }
        if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
      };

      inputModal.addEventListener('click', onBackdrop);
      inputField.addEventListener('keydown', onKeyDown);
      inputOk.addEventListener('click', onOk);
      inputCancel.addEventListener('click', onCancel);
      setTimeout(()=> inputField.focus(), 0);
    });
  }

        renderInlineTags();
        renderTagChoices();
        markDirty();

  function inBodySelection(range){
    if (!range) return false;
    return body.contains(range.commonAncestorContainer);
  }

  function caretRectForRange(range){
    if (!range) return null;
    const clone = range.cloneRange();
    let rect = clone.getBoundingClientRect();
    if (rect && (rect.width || rect.height)) return rect;

    const marker = document.createElement('span');
    marker.textContent = '\u200b';
    marker.style.display = 'inline-block';
    marker.style.width = '1px';
    marker.style.height = '1em';
    clone.insertNode(marker);
    rect = marker.getBoundingClientRect();
    clone.setStartAfter(marker);
    clone.collapse(true);
    const sel = window.getSelection();
    if (sel) {
      sel.removeAllRanges();
      sel.addRange(clone);
    }
    marker.remove();
    return rect;
  }

  function nearestBlock(node){
    let cur = node && (node.nodeType === Node.TEXT_NODE ? node.parentElement : node);
    while (cur && cur !== body) {
      if (cur.matches && cur.matches('p,div,h1,h2,h3,blockquote,pre,figure,li')) return cur;
      cur = cur.parentElement;
    }
    return null;
  }

  function placeToolsForSelection(range){
    const rect = range ? range.getBoundingClientRect() : null;
    if (!rect || (!rect.width && !rect.height)) { tools.style.display='none'; return; }
    tools.style.display='inline-flex';
    tools.style.left = Math.max(8, rect.left + rect.width/2 - tools.offsetWidth/2) + 'px';
    tools.style.top = Math.max(8, rect.top - tools.offsetHeight - 10) + 'px';
  }

  function placePlusAtCaret(range){
    const caretRect = caretRectForRange(range);
    if (!caretRect) { plus.style.display='none'; plus.classList.remove('open'); return; }
    const block = nearestBlock(range.startContainer);
    if (!block) { plus.style.display='none'; plus.classList.remove('open'); return; }
    const tag = block.tagName.toLowerCase();
    if (tag === 'pre') { plus.style.display='none'; plus.classList.remove('open'); return; }
    if (tag === 'figure') { plus.style.display='none'; plus.classList.remove('open'); return; }
    if (tag === 'div' && block.classList.contains('math')) { plus.style.display='none'; plus.classList.remove('open'); return; }
    const blockRect = block.getBoundingClientRect();
    const bodyRect = body.getBoundingClientRect();
    const toggleSize = plusToggle ? plusToggle.offsetWidth || 25 : 25;
    const gapFromBody = 12;
    let right = window.innerWidth - bodyRect.right + gapFromBody;
    right = Math.min(right, window.innerWidth - toggleSize - gapFromBody);
    let top = Math.max(8, blockRect.top + Math.max(0, (blockRect.height - toggleSize) / 2));
    const availableWidth = bodyRect.right - gapFromBody - 8;
    plusMenu.style.maxWidth = Math.max(200, Math.min(availableWidth, 600)) + 'px';
    plus.style.display='flex';
    _markPlusReady();
    plus.style.right = Math.round(right) + 'px';
    plus.style.left = 'auto';
    plus.style.top = Math.round(top) + 'px';
  }

  function syncPlusIcon(){
    if (!plusIcon) return;
    if (plus.classList.contains('open')) {
      plusIcon.setAttribute('d', 'M16 5 9 12l7 7');
      plusToggle.setAttribute('aria-label', 'Collapse add menu');
      plusToggle.setAttribute('title', 'Collapse add menu');
    } else {
      plusIcon.setAttribute('d', 'M20 12h-7V5h-1v7H5v1h7v7h1v-7h7');
      plusToggle.setAttribute('aria-label', 'Add an image, video, embed, or new part');
      plusToggle.setAttribute('title', 'Add an image, video, embed, or new part');
    }
  }

  function updateFloatingUi(){
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) {
      tools.style.display='none';
      plus.style.display='none';
      plus.classList.remove('open');
      syncPlusIcon();
      return;
    }
    const range = sel.getRangeAt(0);
    if (!inBodySelection(range)) {
      tools.style.display='none';
      plus.style.display='none';
      plus.classList.remove('open');
      syncPlusIcon();
      return;
    }
    if (sel.isCollapsed) {
      tools.style.display='none';
      placePlusAtCaret(range);
      return;
    }
    plus.style.display='none';
    plus.classList.remove('open');
    syncPlusIcon();
    hideImageToolbar();
    hideBlockToolbar();
    hideMultiToolbar();
    deselectTableBlocks();
    const block = nearestBlock(range.startContainer);
    if (block && (block.tagName.toLowerCase() === 'pre' || block.tagName.toLowerCase() === 'figure')) {
      tools.style.display='none';
      return;
    }
    placeToolsForSelection(range);
  }

  function onUndoRedoKey(e){
    const mod = e.metaKey || e.ctrlKey;
    if (!mod) return;
    if (e.key === 'z' || e.key === 'Z') {
      e.preventDefault();
      if (e.shiftKey) { if (history.redo()) { setSaveState('is-dirty', 'Unsaved changes'); } }
      else { if (history.undo()) { setSaveState('is-dirty', 'Unsaved changes'); } }
      return;
    }
    if (e.key === 'y' || e.key === 'Y') {
      e.preventDefault();
      if (history.redo()) { setSaveState('is-dirty', 'Unsaved changes'); }
      return;
    }
  }

  // ---------- Block navigation, insertion helpers, image toolbar ----------
  function bodyBlocks(){ return Array.from(body.children).filter(el => el && el.tagName); }
  function isTextElement(el){
    const t = el.tagName.toLowerCase();
    return ['p','h1','h2','h3','h4','h5','h6','blockquote','pre','li'].includes(t);
  }
  function isVoidElement(el){
    const t = el.tagName.toLowerCase();
    return ['hr','figure'].includes(t) || t === 'img';
  }
  function currentBodyBlock(){
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;
    let node = sel.getRangeAt(0).commonAncestorContainer;
    if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
    while (node && node !== body){
      if (node.parentElement === body) return node;
      node = node.parentElement;
    }
    return null;
  }
  function placeCaretIn(el, atStart){
    if (!el) return;
    if (el.focus) el.focus();
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(atStart);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  function isAtStartOfBlock(range, block){
    if (!block) return false;
    const t = block.tagName.toLowerCase();
    if (['hr','figure'].includes(t) || t === 'img') return true;
    const r = document.createRange();
    r.selectNodeContents(block);
    r.setEnd(range.startContainer, range.startOffset);
    return r.toString().trim().length === 0;
  }
  function isAtEndOfBlock(range, block){
    if (!block) return false;
    const t = block.tagName.toLowerCase();
    if (['hr','figure'].includes(t) || t === 'img') return true;
    let node = range.endContainer;
    if (node.nodeType === Node.TEXT_NODE){
      const text = node.textContent || '';
      return range.endOffset === text.length && (node === block.lastChild || node.parentElement === block);
    }
    if (node === block) return range.endOffset >= (block.childNodes.length || 0);
    return false;
  }
  function isAtStartOfNode(range, root){
    const r = document.createRange();
    r.selectNodeContents(root);
    r.setEnd(range.startContainer, range.startOffset);
    return r.toString().length === 0;
  }
  function isAtEndOfNode(range, root){
    const r = document.createRange();
    r.selectNodeContents(root);
    r.setStart(range.endContainer, range.endOffset);
    return r.toString().length === 0;
  }
  function appendParagraphIfNeeded(){
    const blocks = bodyBlocks();
    if (!blocks.length){ const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); return p; }
    const last = blocks[blocks.length - 1];
    if (!isTextElement(last) && last.tagName.toLowerCase() !== 'ul' && last.tagName.toLowerCase() !== 'ol'){
      const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); return p;
    }
    return last;
  }
  function insertTextBlockAfter(reference){
    const p = document.createElement('p'); p.innerHTML = '<br>';
    if (reference && reference.parentElement === body){
      if (reference.nextElementSibling) body.insertBefore(p, reference.nextElementSibling);
      else body.appendChild(p);
    } else {
      body.appendChild(p);
    }
    placeCaretIn(p, true);
    markDirty();
    updateFloatingUi();
  }
  function onBodyArrowKey(e){
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    const block = currentBodyBlock();
    if (!block) return;
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const t = block.tagName.toLowerCase();
    if (e.key === 'ArrowDown'){
      const code = t === 'pre' ? block.querySelector('code') : null;
      if (code && !isAtEndOfNode(range, code)) return;
      if (isVoidElement(block) || isAtEndOfBlock(range, block) || code){
        e.preventDefault();
        const next = block.nextElementSibling;
        if (next && next.parentElement === body){ placeCaretIn(next, true); }
        else { const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); placeCaretIn(p, true); }
        updateFloatingUi();
      }
    } else {
      const code = t === 'pre' ? block.querySelector('code') : null;
      if (code && !isAtStartOfNode(range, code)) return;
      if (isVoidElement(block) || isAtStartOfBlock(range, block) || code){
        e.preventDefault();
        const prev = block.previousElementSibling;
        if (prev && prev.parentElement === body){ placeCaretIn(prev, false); }
        else { title.focus(); }
      }
    }
  }
  function onBackspaceKey(e){
    if (e.key !== 'Backspace') return;
    const block = currentBodyBlock();
    if (!block) return;
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount || !sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    const isEmpty = (block.textContent || '').trim() === '';
    const atStart = isAtStartOfBlock(range, block);
    if (isEmpty) {
      e.preventDefault();
      const prev = block.previousElementSibling;
      if (prev && prev.parentElement === body) { placeCaretIn(prev, false); block.remove(); }
      updateFloatingUi();
      return;
    }
    if (atStart) {
      e.preventDefault();
    }
  }
  function onTitleArrowKey(e){
    if (e.key !== 'ArrowDown') return;
    e.preventDefault();
    const blocks = bodyBlocks();
    if (blocks[0]) placeCaretIn(blocks[0], true);
    else { const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); placeCaretIn(p, true); }
  }

    tb.appendChild(makeBtn('move-down', '↓', 'Move down'));
    tb.appendChild(makeBtn('delete', '×', 'Delete'));

        } else {

  function replaceImageUpload(fig){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', async ()=>{
      const file = input.files && input.files[0];
      if (!file) { input.remove(); return; }
      try {
        const reader = new FileReader();
        const dataUrl = await new Promise((resolve, reject)=>{ reader.onload = ()=>resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(file); });
        const r = await fetch('/editor/api/upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ filename: file.name, dataUrl }) });
        const j = await r.json();
        if (j && j.ok && j.url) {
          const img = fig.querySelector('img');
          if (img) {
            img.setAttribute('src', j.url);
            img.setAttribute('alt', file.name || 'image');
            markDirty();
          }
        }
      } catch (_) {}
      input.value = '';
      input.remove();
    });
    input.click();
  }

        const first = selected[0];

        markDirty();

  // Image resize handle + persistence
  function addImageResizeHandle(fig){
    if (!fig || fig.querySelector('.image-resize-handle')) return;
    const handle = document.createElement('div');
    handle.className = 'image-resize-handle';
    handle.setAttribute('contenteditable', 'false');
    fig.appendChild(handle);
    let startX, startY, startW, startH;
    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      const newW = Math.max(160, Math.min(startW + dx, body.clientWidth - 40));
      const newH = Math.max(120, startH + dy);
      fig.style.width = newW + 'px';
      fig.style.maxWidth = '100%';
      fig.style.height = newH + 'px';
      if (imageToolbar) positionImageToolbar(fig);
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      fig.dataset.width = parseInt(fig.style.width, 10) + '';
      fig.dataset.height = parseInt(fig.style.height, 10) + '';
      markDirty();
    };
    handle.addEventListener('mousedown', (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      startX = ev.clientX;
      startY = ev.clientY;
      startW = fig.getBoundingClientRect().width;
      startH = fig.getBoundingClientRect().height;
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
  function observeImageSize(fig){
    if (!fig || fig.dataset.resizeObserved) return;
    if (!('ResizeObserver' in window)) return;
    const ro = new ResizeObserver((entries) => {
      for (const entry of entries) {
        const w = Math.round(entry.contentRect.width);
        const h = Math.round(entry.contentRect.height);
        if (w) { fig.dataset.width = w + ''; fig.style.width = w + 'px'; fig.style.maxWidth = '100%'; }
        if (h) { fig.dataset.height = h + ''; fig.style.height = h + 'px'; }
      }
    });
    ro.observe(fig);
    fig.dataset.resizeObserved = '1';
  }

  function htmlToOrgNode(node){
    if (!node) return '';
    if (node.nodeType === Node.TEXT_NODE) return (node.textContent || '').replace(/\u200b/g, '');
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    const tag = node.tagName.toLowerCase();
    const childrenToOrg = () => {
      let out = '';
      node.childNodes.forEach(ch => { out += htmlToOrgNode(ch); });
      return out;
    };
    const blockStyleAttr = (n) => {
      return '';
    };
    if (tag === 'br') return '\n';
    if (tag === 'h1') return '\n' + blockStyleAttr(node) + '* ' + childrenToOrg().trim() + '\n';
    if (tag === 'h2') return '\n' + blockStyleAttr(node) + '** ' + childrenToOrg().trim() + '\n';
    if (tag === 'h3') return '\n' + blockStyleAttr(node) + '*** ' + childrenToOrg().trim() + '\n';
    if (tag === 'h4') return '\n' + blockStyleAttr(node) + '**** ' + childrenToOrg().trim() + '\n';
    if (tag === 'h5') return '\n' + blockStyleAttr(node) + '***** ' + childrenToOrg().trim() + '\n';
    if (tag === 'h6') return '\n' + blockStyleAttr(node) + '****** ' + childrenToOrg().trim() + '\n';
    if (tag === 'blockquote') return '\n' + blockStyleAttr(node) + '#+BEGIN_QUOTE\n' + childrenToOrg().trim() + '\n#+END_QUOTE\n';
    if (tag === 'pre') {
      const lang = (node.dataset.lang || node.getAttribute('data-lang') || '').trim() || 'text';
      const bg = (node.getAttribute('data-bg') || 'light').trim();
      const syntaxTheme = (node.getAttribute('data-syntax-theme') || 'default').trim();
      const collect = (n) => {
        let out = '';
        Array.from(n.childNodes).forEach(c => {
          if (c.nodeType === Node.TEXT_NODE) out += c.nodeValue || '';
          else if (c.nodeType === Node.ELEMENT_NODE && c.classList && (c.classList.contains('draft-code-block-actions') || c.classList.contains('image-resize-handle'))) return;
          else if (c.tagName && c.tagName.toLowerCase() === 'br') out += '\n';
          else out += collect(c);
        });
        return out;
      };
      const code = (node.dataset.raw || collect(node)).replace(/\u200b/g, '').trimEnd();
      let out = '\n';
      if (bg && bg !== 'light') out += '#+ATTR_HTML: :data-bg ' + bg + '\n';
      if (syntaxTheme && syntaxTheme !== 'default') out += '#+ATTR_HTML: :data-syntax-theme ' + syntaxTheme + '\n';
      out += '#+BEGIN_SRC ' + lang + '\n' + code + '\n#+END_SRC\n';
      return out;
    }
    if (tag === 'img') {
      const src = (node.getAttribute('src') || '').trim();
      if (!src) return '';
      const alt = (node.getAttribute('alt') || '').trim();
      const caption = isPlaceholderCaption(alt, src) ? '' : alt;
      const fig = '<figure class="image-block fit-cover pos-center align-center" style="width:760px;max-width:100%;height:420px;" data-filter="none" data-fit="cover" data-position="center" data-align="center"><img src="' + src + '" alt="' + (caption || 'image') + '">' + (caption ? '<figcaption>' + caption + '</figcaption>' : '') + '</figure>';
        return '\n#+BEGIN_EXPORT html\n' + fig + '\n#+END_EXPORT\n';
    }
    if (tag === 'figure' && node.classList.contains('image-block')) {
      const clone = node.cloneNode(true);
      clone.querySelectorAll('.image-resize-handle').forEach(el => el.remove());
      const capEl = clone.querySelector('figcaption');
      const imgEl = clone.querySelector('img');
      if (capEl && imgEl) {
        const capText = (capEl.textContent || '').trim();
        const src = (imgEl.getAttribute('src') || '').trim();
        if (isPlaceholderCaption(capText, src)) {
          capEl.remove();
        }
      }
      return '\n#+BEGIN_EXPORT html\n' + clone.outerHTML + '\n#+END_EXPORT\n';
    }
    if (tag === 'figure' && (node.classList.contains('video-embed') || node.classList.contains('embed-card'))) {
      return '\n#+BEGIN_EXPORT html\n' + node.outerHTML + '\n#+END_EXPORT\n';
    }
    if (tag === 'a') {
      const href = (node.getAttribute('href') || '').trim();
      const label = childrenToOrg().trim();
      if (href && /\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(href)) {
        const caption = isPlaceholderCaption(label, href) ? '' : label;
        const fig = '<figure class="image-block fit-cover pos-center align-center" style="width:760px;max-width:100%;height:420px;" data-filter="none" data-fit="cover" data-position="center" data-align="center"><img src="' + href + '" alt="' + (caption || 'image') + '">' + (caption ? '<figcaption>' + caption + '</figcaption>' : '') + '</figure>';
      return '\n#+BEGIN_EXPORT html\n' + fig + '\n#+END_EXPORT\n';
      }
      if (href && label) return '[[' + href + '][' + label + ']]';
      return label;
    }
    if (tag === 'b' || tag === 'strong') return '*' + childrenToOrg().trim() + '*';
    if (tag === 'i' || tag === 'em') return '/' + childrenToOrg().trim() + '/';
    if (tag === 'u') return '_' + childrenToOrg().trim() + '_';
    if (tag === 'del' || tag === 's') return '+' + childrenToOrg().trim() + '+';
    if (tag === 'code') return '~' + (node.textContent || '').replace(/\u200b/g, '').trim() + '~';
    if (tag === 'sub') return '_{' + childrenToOrg().trim() + '}';
    if (tag === 'sup') return '^{' + childrenToOrg().trim() + '}';
    if (tag === 'span') {
      const color = node.style.color || '';
      const bg = node.style.backgroundColor || '';
      const fontSize = node.style.fontSize || '';
      const text = childrenToOrg().trim();
      if (!text) return '';
      if (fontSize) return '@@html:<span style="font-size:' + fontSize + '">' + text + '</span>@@';
      if (bg && bg !== 'transparent') return '@@html:<mark style="background-color:' + bg + '">' + text + '</mark>@@';
      if (color) return '@@html:<span style="color:' + color + '">' + text + '</span>@@';
      return text;
    }
    if (tag === 'mark') {
      const color = node.style.backgroundColor || '#ffea55';
      return '@@html:<mark style="background-color:' + color + '">' + childrenToOrg().trim() + '</mark>@@';
    }
    if (tag === 'li') return childrenToOrg().trim() + '\n';
    if (tag === 'ul' && node.classList.contains('checkbox')) {
      const items = Array.from(node.children).map(li => {
        const cb = li.querySelector('input[type="checkbox"]');
        const checked = cb && cb.checked;
        return '- [' + (checked ? 'X' : ' ') + '] ' + htmlToOrgNode(li).trim();
      }).join('\n');
      return items + '\n\n';
    }
    if (tag === 'ul') {
      const items = Array.from(node.children).map(li => '- ' + htmlToOrgNode(li).trim()).join('\n');
      return items + '\n\n';
    }
    if (tag === 'ol') {
      const items = Array.from(node.children).map((li, i) => (i + 1) + '. ' + htmlToOrgNode(li).trim()).join('\n');
      return items + '\n\n';
    }
    if (tag === 'hr') return '\n-----\n\n';
    if (tag === 'div' && node.classList.contains('verse')) return '\n#+BEGIN_VERSE\n' + childrenToOrg().trim() + '\n#+END_VERSE\n\n';
    if (tag === 'div' && node.classList.contains('center')) return '\n#+BEGIN_CENTER\n' + childrenToOrg().trim() + '\n#+END_CENTER\n\n';
    if (tag === 'div' || tag === 'p') {
      const inner = childrenToOrg().trim();
      return (inner ? ('\n' + blockStyleAttr(node) + inner + '\n') : '\n');
    }
    return childrenToOrg();
  }

   const CODE_LANGUAGES = [

  function bindCodeBlockInput(pre){
    const code = pre.querySelector('code');
    if (!code) return;
    code.addEventListener('keydown', (e)=>{
      if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (e.key === 'ArrowDown' && isAtEndOfNode(range, code)){
        e.preventDefault();
        e.stopPropagation();
        const next = pre.nextElementSibling;
        if (next && next.parentElement === body){ placeCaretIn(next, true); }
        else { const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); placeCaretIn(p, true); }
        updateFloatingUi();
      }
      if (e.key === 'ArrowUp' && isAtStartOfNode(range, code)){
        e.preventDefault();
        e.stopPropagation();
        const prev = pre.previousElementSibling;
        if (prev && prev.parentElement === body){ placeCaretIn(prev, false); }
        else { title.focus(); }
        updateFloatingUi();
      }
    });
  }

  function highlightCodeBlock(pre){
    const code = pre.querySelector('code');
    if (!code || !window.Prism) return;
    const sel = window.getSelection();
    const active = document.activeElement === code;
    let offset = 0;
    if (active && sel.rangeCount) {
      const r = document.createRange();
      r.selectNodeContents(code);
      r.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
      offset = r.toString().length;
    }
    const lang = (pre.getAttribute('data-lang') || 'text').trim().toLowerCase();
    const raw = pre.dataset.raw || '\n';
    code.className = 'language-' + escapeHtml(lang);

    const doHighlight = () => {
      const grammar = Prism.languages[lang] || Prism.languages.text || {};
      code.innerHTML = Prism.highlight(raw, grammar, lang);
      if (active) {
        restoreTextOffset(code, offset);
        code.focus();
      }
    };

    if (lang === 'text' || Prism.languages[lang]) {
      doHighlight();
    } else if (Prism.plugins && Prism.plugins.autoloader && Prism.plugins.autoloader.loadLanguages) {
      Prism.plugins.autoloader.loadLanguages(lang, doHighlight);
    } else {
      doHighlight();
    }
  }

  function restoreTextOffset(root, targetOffset){
    const sel = window.getSelection();
    const range = document.createRange();
    let remaining = targetOffset;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    let node;
    while ((node = walker.nextNode())) {
      const len = node.textContent.length;
      if (remaining <= len) {
        range.setStart(node, Math.min(remaining, len));
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        return;
      }
      remaining -= len;
    }
    range.selectNodeContents(root);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function toCodeHighlightMode(pre){
    if (!pre) return;
    const existingCode = pre.querySelector('code');
    let raw = pre.dataset.raw;
    if (raw === undefined) {
      raw = existingCode ? existingCode.textContent : pre.textContent;
    }
    raw = (raw || '').replace(/\u200b/g, '');
    pre.dataset.raw = raw;
    const lang = (pre.getAttribute('data-lang') || 'text').trim().toLowerCase();
    let bg = pre.getAttribute('data-bg');
    let syntaxTheme = pre.getAttribute('data-syntax-theme');
    if (!bg || !syntaxTheme) {
      const oldTheme = (pre.getAttribute('data-theme') || 'light').trim().toLowerCase();
      if (!bg) bg = oldTheme === 'light' ? 'light' : 'dark';
      if (!syntaxTheme) syntaxTheme = oldTheme === 'monokai' ? 'monokai' : (oldTheme === 'light' ? 'default' : 'dark');
    }
    pre.removeAttribute('data-mode');
    pre.setAttribute('data-bg', bg);
    pre.setAttribute('data-syntax-theme', syntaxTheme);
    pre.classList.add('syntax-theme-' + syntaxTheme, 'language-' + lang);
    pre.innerHTML = codeBlockToolbarHtml() + '<code spellcheck="false" class="language-' + escapeHtml(lang) + '" contenteditable="true">' + escapeHtml(raw || '\n') + '</code>';
    bindCodeBlockToolbar(pre);
    bindCodeBlockInput(pre);
    syncCodeBlockToolbar(pre);
    highlightCodeBlock(pre);
  }

  function setCodeBlockSyntaxTheme(pre, syntaxTheme){
    const oldSyntaxTheme = pre.getAttribute('data-syntax-theme') || 'default';
    pre.classList.remove('syntax-theme-' + oldSyntaxTheme);
    syntaxTheme = (syntaxTheme || 'default').trim().toLowerCase();
    if (!CODE_SYNTAX_THEMES.some(([v]) => v === syntaxTheme)) syntaxTheme = 'default';
    pre.setAttribute('data-syntax-theme', syntaxTheme);
    pre.classList.add('syntax-theme-' + syntaxTheme);
    syncCodeBlockToolbar(pre);
    highlightCodeBlock(pre);
    markDirty();

  function isPlaceholderCaption(text, src){
    if (!text) return true;
    const t = text.toLowerCase();
    if (t.includes('placeholder')) return true;
    const filename = (src || '').split('/').pop().split('?')[0].toLowerCase();
    if (filename && t === filename.toLowerCase()) return true;
    if (filename && t === filename.replace(/.[^.]+$/, '').toLowerCase()) return true;
    if (/^(image|img|picture|photo|screenshot|untitled)$/i.test(t)) return true;
    return false;
  }

  function canonicalizeLegacyImageNodes(){
    const isImageUrl = (v) => /\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test((v || '').trim());
    const cleanSrc = (src) => (src || '').replace(/^file:\/\//i, '');
    const toFigure = (src, caption) => {
      const safeCaption = isPlaceholderCaption(caption, src) ? '' : (caption || '');
      const fig = document.createElement('figure');
      fig.className = 'image-block fit-cover pos-center align-center';
      fig.setAttribute('style', 'width:760px;max-width:100%;height:420px;');
      fig.setAttribute('data-filter', 'none');
      fig.setAttribute('data-fit', 'cover');
      fig.setAttribute('data-position', 'center');
      fig.setAttribute('data-align', 'center');
      fig.setAttribute('tabindex', '0');
      const img = document.createElement('img');
      img.setAttribute('src', src);
      img.setAttribute('alt', safeCaption || 'image');
      img.setAttribute('draggable', 'false');
      fig.appendChild(img);
      if (safeCaption) {
        const fc = document.createElement('figcaption');
        fc.setAttribute('contenteditable', 'true');
        fc.textContent = safeCaption;
        fig.appendChild(fc);
      }
      return fig;
    };

    Array.from(body.children).forEach((el)=>{
      if (!el || !el.tagName) return;
      const tag = el.tagName.toLowerCase();
      if (tag === 'figure') return;

    if (tag === 'pre' && el.classList.contains('code-block')) {
      ensureCodeBlockToolbar(el);
      return;
    }

      if (tag === 'img') {
        const src = cleanSrc((el.getAttribute('src') || '').trim());
        if (!src) return;
        el.replaceWith(toFigure(src, (el.getAttribute('alt') || '').trim()));
        return;
      }

      if (tag === 'a') {
        const href = cleanSrc((el.getAttribute('href') || '').trim());
        if (!isImageUrl(href)) return;
        el.replaceWith(toFigure(href, (el.textContent || '').trim()));
        return;
      }

      if (tag === 'div' && el.classList.contains('org-src-container')) {
        const srcPre = el.querySelector('pre.src');
        if (!srcPre) return;
        const klass = srcPre.className || '';
        const m = klass.match(/\bsrc-([a-z0-9-]+)\b/i);
        const lang = m ? m[1].toLowerCase() : 'text';
        const oldTheme = (srcPre.getAttribute('data-theme') || el.getAttribute('data-theme') || 'light').trim().toLowerCase();
        const savedMeta = body.dataset.codeMeta ? (function(){try{return JSON.parse(body.dataset.codeMeta)}catch(e){return {}}}()) : {};
        const bg = savedMeta['data-bg'] || (oldTheme === 'light' ? 'light' : 'dark');
        const syntaxTheme = savedMeta['data-syntax-theme'] || (oldTheme === 'monokai' ? 'monokai' : (oldTheme === 'light' ? 'default' : 'dark'));
        const pre = document.createElement('pre');
        pre.className = 'code-block syntax-theme-' + syntaxTheme + ' language-' + lang;
        pre.setAttribute('data-lang', lang);
        pre.setAttribute('data-bg', bg);
        pre.setAttribute('data-syntax-theme', syntaxTheme);
        pre.setAttribute('spellcheck', 'false');
        pre.dataset.raw = (srcPre.textContent || '').replace(/\u200b/g, '');
        el.replaceWith(pre);
        toCodeHighlightMode(pre);
        return;
      }

      if (tag === 'pre' && el.classList.contains('src') && !el.classList.contains('code-block')) {
        const klass = el.className || '';
        const m = klass.match(/\bsrc-([a-z0-9-]+)\b/i);
        const lang = m ? m[1].toLowerCase() : 'text';
        const oldTheme = (el.getAttribute('data-theme') || (el.parentElement && el.parentElement.getAttribute('data-theme')) || 'light').trim().toLowerCase();
        const savedMeta = body.dataset.codeMeta ? (function(){try{return JSON.parse(body.dataset.codeMeta)}catch(e){return {}}}()) : {};
        const bg = savedMeta['data-bg'] || (oldTheme === 'light' ? 'light' : 'dark');
        const syntaxTheme = savedMeta['data-syntax-theme'] || (oldTheme === 'monokai' ? 'monokai' : (oldTheme === 'light' ? 'default' : 'dark'));
        el.className = 'code-block syntax-theme-' + syntaxTheme + ' language-' + lang;
        el.setAttribute('data-lang', lang);
        el.setAttribute('data-bg', bg);
        el.setAttribute('data-syntax-theme', syntaxTheme);
        el.setAttribute('spellcheck', 'false');
        el.dataset.raw = (el.textContent || '').replace(/\u200b/g, '');
        toCodeHighlightMode(el);
        return;
      }

      if (tag !== 'p') return;
      const firstChild = el.firstElementChild;
      const img = (firstChild && firstChild.tagName && firstChild.tagName.toLowerCase() === 'img') ? firstChild : null;
      if (img) {
        const src = cleanSrc((img.getAttribute('src') || '').trim());
        if (!src) return;
        const tail = Array.from(el.childNodes)
          .filter(n => n.nodeType === Node.TEXT_NODE)
          .map(n => (n.textContent || '').trim())
          .join(' ')
          .trim();
        const caption = tail || (img.getAttribute('alt') || '').trim();
        el.replaceWith(toFigure(src, caption));
        return;
      }
      const a = (firstChild && firstChild.tagName && firstChild.tagName.toLowerCase() === 'a') ? firstChild : null;
      if (a) {
        const href = cleanSrc((a.getAttribute('href') || '').trim());
        if (!isImageUrl(href)) return;
        el.replaceWith(toFigure(href, (a.textContent || '').trim()));
      }
    });

    // Wrap bare tables in figure.table-block and make cells editable.
    body.querySelectorAll('table').forEach((table) => {
      if (table.closest('figure.table-block')) return;
      const figure = document.createElement('figure');
      figure.className = 'table-block';
      table.parentElement.insertBefore(figure, table);
      figure.appendChild(table);
      table.querySelectorAll('td, th').forEach((cell) => { cell.contentEditable = 'true'; });
    });

    // Ensure math blocks have data-latex.
    body.querySelectorAll('div.math, span.math').forEach((el) => {
      if (!el.getAttribute('data-latex')) el.setAttribute('data-latex', el.textContent || '');
    });
  }

  function saveDraft(){
    const seq = ++saveSeq;
    const payload = htmlToOrg();
    if (!dirty || isSaving) return;
    const versionAtStart = changeVersion;
    const saveMode = /^posts\//.test((targetPath || '').trim()) ? 'publish' : 'draft';
    isSaving = true;
    setSaveState('is-saving', 'Saving...');
    fetch('/editor/api/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title: payload.title, body: payload.body, mode: saveMode, targetPath, tags: draftTags })
    }).then(r => r.json()).then((resp)=>{
      if (seq !== saveSeq) return;
      if (resp && resp.ok && resp.path) {
        targetPath = resp.path;
        body.dataset.targetPath = resp.path;
        if (changeVersion === versionAtStart) {
          dirty = false;
          setSaveState('is-saved', 'Saved just now');
        } else {
          setSaveState('is-dirty', 'Unsaved changes');
        }
      } else {
        setSaveState('is-error', 'Save failed');
      }
    }).catch(()=>{
      if (seq !== saveSeq) return;
      setSaveState('is-error', 'Save failed');
    }).finally(()=>{
      isSaving = false;
    });
  }

  function insertHtmlAtCursor(html){
    restoreSelection();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const wrap = document.createElement('div');
    wrap.innerHTML = html;
    const frag = document.createDocumentFragment();
    let node; let last = null;
    while ((node = wrap.firstChild)) { last = frag.appendChild(node); }
    range.insertNode(frag);
    if (last) {
      range.setStartAfter(last); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    }
    normalizeMediaUrls();
    refreshImageBlocks();
    markDirty();
  }

  function insertCodeBlockAtCursor(lang){
    restoreSelection();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();

    const codeLang = (lang || 'text').toLowerCase();
    const pre = document.createElement('pre');
    pre.className = 'code-block syntax-theme-default language-' + codeLang;
    pre.setAttribute('data-lang', codeLang);
    pre.setAttribute('data-bg', 'light');
    pre.setAttribute('data-syntax-theme', 'default');
    pre.setAttribute('spellcheck', 'false');

    const para = document.createElement('p');
    para.innerHTML = '<br>';

    range.insertNode(para);
    range.insertNode(pre);

    toCodeHighlightMode(pre);
    const code = pre.querySelector('code');
    if (code) {
      const caret = document.createRange();
      caret.selectNodeContents(code);
      caret.collapse(true);
      sel.removeAllRanges();
      sel.addRange(caret);
      code.focus();
    }
    cacheSelection();
    refreshImageBlocks();
    markDirty();
    updateFloatingUi();
  }

  let tableToolbar = null;
  function createTableToolbar(){
    const tb = document.createElement('div');
    tb.className = 'draft-table-tools';
    tb.id = 'draft-table-tools';
    const makeBtn = (action, label, title) => {
      const b = document.createElement('button');
      b.type = 'button'; b.dataset.action = action; b.title = title; b.textContent = label;
      return b;
    };
    tb.appendChild(makeBtn('add-row', '+R', 'Add row'));
    tb.appendChild(makeBtn('add-col', '+C', 'Add column'));
    tb.appendChild(makeBtn('remove-row', '-R', 'Remove row'));
    tb.appendChild(makeBtn('remove-col', '-C', 'Remove column'));
    document.body.appendChild(tb);
    tb.addEventListener('mousedown', (e) => e.preventDefault());
    tb.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const fig = document.querySelector('.draft-editable figure.table-block.selected');
      if (!fig) return;
      const table = fig.querySelector('table');
      if (!table) return;
      const action = btn.dataset.action;
      if (action === 'add-row'){
        const tr = document.createElement('tr');
        const cols = table.querySelector('tr') ? table.querySelector('tr').children.length : 3;
        for (let i = 0; i < cols; i++){ const td = document.createElement('td'); td.innerHTML = '<br>'; td.contentEditable = 'true'; tr.appendChild(td); }
        table.querySelector('tbody') ? table.querySelector('tbody').appendChild(tr) : table.appendChild(tr);
      } else if (action === 'add-col'){
        table.querySelectorAll('tr').forEach(tr => { const td = document.createElement('td'); td.innerHTML = '<br>'; td.contentEditable = 'true'; tr.appendChild(td); });
      } else if (action === 'remove-row'){
        const rows = table.querySelectorAll('tr');
        if (rows.length > 1) rows[rows.length - 1].remove();
      } else if (action === 'remove-col'){
        table.querySelectorAll('tr').forEach(tr => { if (tr.children.length > 1) tr.lastElementChild.remove(); });
      }
      markDirty();
      positionTableToolbar(fig);
    });
    return tb;
  }

  function placeCaretInCell(cell){
    if (!cell) return;
    cell.focus();
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(cell);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function onTableKey(e){
    const td = e.target.closest && e.target.closest('figure.table-block td, figure.table-block th');
    if (!td) return;
    if (e.key !== 'Tab' && e.key !== 'Enter') return;
    e.preventDefault();
    const row = td.parentElement;
    const table = row.closest('table');
    const cells = Array.from(row.children);
    const rowIdx = Array.from(table.querySelectorAll('tr')).indexOf(row);
    const cellIdx = cells.indexOf(td);
    if (e.key === 'Tab'){
      const nextCell = cells[cellIdx + 1];
      if (nextCell){ placeCaretInCell(nextCell); }
      else {
        const rows = Array.from(table.querySelectorAll('tr'));
        const nextRow = rows[rowIdx + 1];
        if (nextRow && nextRow.firstElementChild){ placeCaretInCell(nextRow.firstElementChild); }
        else {
          const newRow = document.createElement('tr');
          const cols = cells.length || 3;
          for (let i = 0; i < cols; i++){ const ntd = document.createElement('td'); ntd.innerHTML = '<br>'; ntd.contentEditable = 'true'; newRow.appendChild(ntd); }
          table.querySelector('tbody') ? table.querySelector('tbody').appendChild(newRow) : table.appendChild(newRow);
          placeCaretInCell(newRow.firstElementChild);
        }
      }
    } else {
      const newRow = document.createElement('tr');
      const cols = cells.length || 3;
      for (let i = 0; i < cols; i++){ const ntd = document.createElement('td'); ntd.innerHTML = '<br>'; ntd.contentEditable = 'true'; newRow.appendChild(ntd); }
      table.querySelector('tbody') ? table.querySelector('tbody').insertBefore(newRow, row.nextSibling) : table.insertBefore(newRow, row.nextSibling);
      placeCaretInCell(newRow.children[Math.min(cellIdx, cols - 1)]);
    }
    markDirty();
  }

  function isSelectionInsideEditor(range){

  function cacheSelection(){

    savedRange = range.cloneRange();

  function restoreSelection(){
    if (!savedRange) return;
    const sel = window.getSelection();
    if (!sel) return;
    sel.removeAllRanges();
    sel.addRange(savedRange);

  function execWithSelection(fn){

  async function populateFontLibrary(){
    if (!fontFamily) return;
    const compactLabel = (name) => {
      if (!name) return '';
      const trimmed = name.trim();
      return trimmed.length > 24 ? (trimmed.slice(0, 23) + '…') : trimmed;
    };
    const base = [
      { label: 'Serif', value: 'Charter, Georgia, serif' },
      { label: 'Sans', value: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' },
      { label: 'Mono', value: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' }
    ];
    fontFamily.innerHTML = '<option value="">Font</option>';
    base.forEach((f)=>{
      const opt = document.createElement('option');
      opt.value = f.value;
      opt.textContent = f.label;
      fontFamily.appendChild(opt);
    });
    if (!('queryLocalFonts' in window)) return;
    try {
      const fonts = await window.queryLocalFonts();
      const families = [...new Set((fonts || []).map(f => (f.family || '').trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
      if (!families.length) return;
      const sep = document.createElement('option');
      sep.value = '';
      sep.textContent = '────────';
      sep.disabled = true;
      fontFamily.appendChild(sep);
      families.forEach((family)=>{
        const opt = document.createElement('option');
        opt.value = '"' + family.replace(/"/g, '\\"') + '", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        opt.textContent = compactLabel(family);
        opt.title = family;
        fontFamily.appendChild(opt);
      });
    } catch (_) {
      // Permission denied or unsupported context; keep defaults only.
    }
  }

  function nearestPre(node){
    let cur = node && (node.nodeType === Node.TEXT_NODE ? node.parentElement : node);
    while (cur && cur !== body) {
      if (cur.tagName && cur.tagName.toLowerCase() === 'pre') return cur;
      cur = cur.parentElement;
    }
    return null;
  }

  function wrapSelectionWithStyle(styleText){
    restoreSelection();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    if (!isSelectionInsideEditor(range)) return;
    const span = document.createElement('span');
    span.setAttribute('style', styleText);
    try {
      range.surroundContents(span);
      sel.removeAllRanges();
      const r2 = document.createRange();
      r2.selectNodeContents(span);
      sel.addRange(r2);
    } catch (_) {
      const frag = range.extractContents();
      span.appendChild(frag);
      range.insertNode(span);
      sel.removeAllRanges();
      const r2 = document.createRange();
      r2.selectNodeContents(span);
      sel.addRange(r2);
    }
    cacheSelection();
    markDirty();
    updateFloatingUi();
  }

  function getSelectionFontSizePx(){
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;
    let node = sel.getRangeAt(0).commonAncestorContainer;
    if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
    if (!node) return null;
    const computed = window.getComputedStyle(node);
    const px = parseFloat(computed.fontSize);
    return isNaN(px) ? null : px;
  }

  function changeFontSize(delta){
    const current = getSelectionFontSizePx();
    const base = current || 21;
    let next = Math.round(base + delta);
    next = Math.max(12, Math.min(72, next));
    wrapSelectionWithStyle('font-size:' + next + 'px;');
  }

    if (action === 'open-fg') {
      openColorPopover('foreground', fgControl || btn);
      return;

    if (action === 'clear') { execWithSelection(() => document.execCommand('removeFormat', false, null)); }
    if (action === 'font-size-up') { changeFontSize(2); }
    if (action === 'font-size-down') { changeFontSize(-2); }

  }
  if (colorPopMore) {
    colorPopMore.addEventListener('click', ()=>{
      if (activeColorKind === 'highlight' && highlightCustom) highlightCustom.click();
      if (activeColorKind === 'foreground' && foregroundCustom) foregroundCustom.click();
    });
  }

  plusToggle.addEventListener('click', ()=>{
    plus.classList.toggle('open');
    syncPlusIcon();
    updateFloatingUi();
  });

  addTagBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if (tagPop.classList.contains('open')) closeTagPopover();
    else openTagPopover();
  });

  tagNewBtn.addEventListener('click', ()=>{
    tagNewInput.classList.add('open');
    tagNewInput.focus();
  });

  tagSaveBtn.addEventListener('click', ()=>{
    const tag = normalizeTag(tagNewInput.value);
    if (!tag) return;
    if (!availableTags.includes(tag)) availableTags.push(tag);
    if (!draftTags.includes(tag)) draftTags.push(tag);
    draftTags = draftTags.filter(t => t !== 'untagged');
    tagNewInput.value = '';
    tagNewInput.classList.remove('open');
    renderInlineTags();
    renderTagChoices();
    markDirty();
  });

  tagNewInput.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter') {
      e.preventDefault();
      tagSaveBtn.click();
    }
  });

  document.addEventListener('click', (e)=>{
    if (!tagPop.classList.contains('open')) return;
    if (tagPop.contains(e.target) || addTagBtn.contains(e.target)) return;
    closeTagPopover();
  });
  document.addEventListener('click', (e)=>{
    if (!colorPop.classList.contains('open')) return;
    if (colorPop.contains(e.target) || (hlControl && hlControl.contains(e.target)) || (fgControl && fgControl.contains(e.target))) return;
    closeColorPopover();
  });

  document.addEventListener('mousedown', (e)=>{
    const inEditor = body.contains(e.target) || title.contains(e.target);
    const inToolbar = (tools && tools.contains(e.target)) ||
                      (imageToolbar && imageToolbar.contains(e.target)) ||
                      (blockToolbar && blockToolbar.contains(e.target)) ||
                      (multiToolbar && multiToolbar.contains(e.target)) ||
                      (tableToolbar && tableToolbar.contains(e.target)) ||
                      (colorPop && colorPop.contains(e.target)) ||
                      (plus && plus.contains(e.target));
    if (!inEditor && !inToolbar) {
      deselectBlocks();
      tools.style.display = 'none';
      closeColorPopover();
      return;
    }
    if (inEditor && !inToolbar) {
      const selectedImage = document.querySelector('.draft-editable figure.image-block.selected');
      if (selectedImage && !selectedImage.contains(e.target)) deselectImageBlocks();
      const selectedTable = document.querySelector('.draft-editable figure.table-block.selected');
      if (selectedTable && !selectedTable.contains(e.target)) deselectTableBlocks();
    }
  });

  plusMenu.addEventListener('click', async (e)=>{
    const btn = e.target.closest('button');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'text') {
      plus.classList.remove('open');
      syncPlusIcon();
      insertTextBlockAfter(currentBodyBlock());
      return;
    }
    if (action === 'image') {
      upload.click();
      return;
    }
    if (action === 'upload') { fileUpload.click(); return; }
    if (action === 'video') {
      const url = await askInput({ title:'Insert Video', label:'Video URL', placeholder:'https://youtube.com/... or embed URL', okText:'Insert' });
      if (url) insertHtmlAtCursor('<figure class="video-embed"><iframe src="' + url + '" loading="lazy" allowfullscreen></iframe></figure><p><br></p>');
      return;
    }
    if (action === 'embed') {
      const url = await askInput({ title:'Embed Link', label:'URL', placeholder:'https://example.com', okText:'Embed' });
      if (!url) return;
      try {
        const r = await fetch('/editor/api/fetch-meta', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url}) });
        const j = await r.json();
        const t = j.title || url, d = j.description || '', s = j.site || '', img = j.image || '';
        insertHtmlAtCursor('<figure class="embed-card"><a class="embed-card-link" href="'+url+'"><div class="embed-card-copy"><h4>'+t+'</h4><p>'+d+'</p><small>'+s+'</small></div>' + (img ? '<img src="'+img+'" alt="'+t+'">' : '') + '</a></figure><p><br></p>');
      } catch (_) {}
      return;
    }
    if (action === 'code') {
      const lang = ((await askInput({ title:'Insert Code Block', label:'Language', placeholder:'python, sh, js', value:'text', okText:'Insert' })) || 'text').trim();
      insertCodeBlockAtCursor(lang);
      return;
    }
    if (action === 'source') {
      const lang = ((await askInput({ title:'Insert Source Block', label:'Language', placeholder:'python, ruby, emacs-lisp', value:'text', okText:'Insert' })) || 'text').trim();
      insertCodeBlockAtCursor(lang);
      return;
    }
    if (action === 'ditaa') {
      insertCodeBlockAtCursor('ditaa');
      const pre = body.querySelector('pre.code-block[data-lang="ditaa"]:last-of-type');
      if (pre) { pre.dataset.raw = '+--------+   +--------+\n|  Node  |-->|  Node  |\n+--------+   +--------+'; highlightCodeBlock(pre); }
      return;
    }
    if (action === 'plantuml') {
      insertCodeBlockAtCursor('plantuml');
      const pre = body.querySelector('pre.code-block[data-lang="plantuml"]:last-of-type');
      if (pre) { pre.dataset.raw = '@startuml\nAlice -> Bob: Hello\nBob --> Alice: Hi\n@enduml'; highlightCodeBlock(pre); }
      return;
    }
    if (action === 'ascii') {
      insertCodeBlockAtCursor('text');
      const pre = body.querySelector('pre.code-block[data-lang="text"]:last-of-type');
      if (pre) { pre.dataset.raw = '    /\\\n   /  \\\n  /----\\\n /      \\\n/________\\'; highlightCodeBlock(pre); }
      return;
    }
    if (action === 'table') {
      insertTableAtCursor();
      return;
    }
    if (action === 'equation') {
      insertEquationAtCursor();
      return;
    }
    if (action === 'blockquote') {
      insertHtmlAtCursor('<blockquote><p><br></p></blockquote><p><br></p>');
      return;
    }
    if (action === 'hr') {
      insertHtmlAtCursor('<hr><p><br></p>');
      return;
    }
    if (action === 'example') {
      insertCodeBlockAtCursor('example');
      return;
    }
    if (action === 'checkbox') {
      insertHtmlAtCursor('<ul class="checkbox"><li><input type="checkbox" disabled> <br></li></ul><p><br></p>');
      return;
    }
    if (action === 'verse') {
      insertHtmlAtCursor('<div class="verse"><p><br></p></div><p><br></p>');
      return;
    }
    if (action === 'center') {
      insertHtmlAtCursor('<div class="center"><p><br></p></div><p><br></p>');
      return;
    }
  });

  upload.addEventListener('change', async ()=>{
    const file = upload.files && upload.files[0];
    if (!file) return;
    try {
      const reader = new FileReader();
      const dataUrl = await new Promise((resolve, reject)=>{ reader.onload = ()=>resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(file); });
      const r = await fetch('/editor/api/upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ filename: file.name, dataUrl }) });
      const j = await r.json();
      if (j && j.ok && j.url) {
          insertHtmlAtCursor('<figure class="image-block fit-cover pos-center align-center" style="width:760px;max-width:100%;height:420px;" data-filter="none" data-fit="cover" data-position="center" data-align="center"><img src="'+j.url+'" alt=""></figure><p><br></p>');
        setTimeout(()=>{ refreshImageBlocks(); }, 0);
      }
    } catch (_) {}
    upload.value = '';
  });

  if (fileUpload) {
    fileUpload.addEventListener('change', async ()=>{
      const file = fileUpload.files && fileUpload.files[0];
      if (!file) return;
      try {
        const reader = new FileReader();
        const dataUrl = await new Promise((resolve, reject)=>{ reader.onload = ()=>resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(file); });
        const r = await fetch('/editor/api/upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ filename: file.name, dataUrl }) });
        const j = await r.json();
        if (j && j.ok && j.url) {
          const safeName = (file.name || 'download').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          insertHtmlAtCursor('<p><a href="' + j.url + '" download>' + safeName + '</a></p><p><br></p>');
        }
      } catch (_) {}
      fileUpload.value = '';
    });
  }

  function normalizeMediaUrls(){
    const pathParts = location.pathname.split('/').filter(Boolean);
    const slug = pathParts.length ? pathParts[pathParts.length - 1] : '';
    const sourceSlug = new URLSearchParams(location.search).get('srcslug') || '';
    const dateText = (document.querySelector('.post-author-date')?.textContent || '').trim();
    const datePart = (dateText.match(/\d{4}-\d{2}-\d{2}/) || [])[0] || '';
    const datePath = datePart ? datePart.replace(/-/g, '/') : '';
    body.querySelectorAll('img').forEach((img)=>{
      const raw = (img.getAttribute('src') || '').trim();
      if (!raw) return;
      if (/^(https?:|data:|\/)/i.test(raw)) return;
      if (/^file:\/\/\/assets\//i.test(raw)) {
        img.setAttribute('src', raw.replace(/^file:\/\//i, ''));
        return;
      }
      if (/^file:\/\/\/media\//i.test(raw)) {
        img.setAttribute('src', raw.replace(/^file:\/\//i, ''));
        return;
      }
      let clean = raw.replace(/^\.\//, '');
      clean = clean.replace(/^file:\/\/\//i, '');
      clean = clean.replace(/^.*\/assets\//i, '');
      clean = clean.replace(/^.*\/media\/images\//i, '');
      const cands = [];
      if (datePath && slug) cands.push('/assets/blog/' + datePath + '/' + slug + '/' + clean);
      if (datePath && sourceSlug && sourceSlug !== slug) cands.push('/assets/blog/' + datePath + '/' + sourceSlug + '/' + clean);
      cands.push('/assets/' + clean);
      cands.push('/media/images/' + clean);
      img.setAttribute('src', cands[0]);
      let idx = 0;
      img.onerror = () => {
        idx += 1;
        if (idx < cands.length) img.setAttribute('src', cands[idx]);
      };
    });
  }

  document.addEventListener('selectionchange', ()=>{ cacheSelection(); setTimeout(updateFloatingUi, 0); });
  body.addEventListener('keyup', updateFloatingUi);
  body.addEventListener('mouseup', updateFloatingUi);
  body.addEventListener('click', updateFloatingUi);
  body.addEventListener('focus', updateFloatingUi);
  body.addEventListener('input', markDirty);
  body.addEventListener('input', (e)=>{
    const pre = e.target && e.target.closest ? e.target.closest('pre.code-block') : null;
    if (!pre) return;
    const code = pre.querySelector('code');
    if (!code) return;
    pre.dataset.raw = (code.textContent || '').replace(/\u200b/g, '');
    clearTimeout(pre._debounceHighlight);
    pre._debounceHighlight = setTimeout(()=>{
      highlightCodeBlock(pre);
    }, 400);
  });
  body.addEventListener('input', normalizeMediaUrls);
  title.addEventListener('input', markDirty);
  title.addEventListener('keydown', onTitleArrowKey);
  body.addEventListener('keydown', onUndoRedoKey);
  body.addEventListener('keydown', onBodyArrowKey);
  body.addEventListener('keydown', onImageKeyDelete);
  body.addEventListener('keydown', onBlockKeyDelete);
  body.addEventListener('keydown', onTableKey);
  body.addEventListener('keydown', onBackspaceKey);
  body.addEventListener('click', (e)=>{
    const fig = e.target.closest && e.target.closest('figure.image-block');
    if (fig && !(e.target.closest && e.target.closest('figcaption'))) {
      if (e.shiftKey) {
        e.preventDefault();
        toggleMultiSelectBlock(fig);
        return;
      }
      e.preventDefault();
      selectImageBlock(fig);
      addImageResizeHandle(fig);
      observeImageSize(fig);
      return;
    }
    const tableFig = e.target.closest && e.target.closest('figure.table-block');
    if (tableFig) {
      if (e.shiftKey) { e.preventDefault(); toggleMultiSelectBlock(tableFig); return; }
      e.preventDefault();
      selectTableBlock(tableFig);
      return;
    }
    const block = e.target && e.target.closest && e.target.closest('.draft-editable > *');
    if (block && block.parentElement === body && !block.classList.contains('image-block') && !block.classList.contains('table-block')) {
      const t = block.tagName.toLowerCase();
      if (['p','div','h1','h2','h3','h4','h5','h6','blockquote','pre','ul','ol','hr'].includes(t)) {
        if (e.target === block) {
          if (e.shiftKey) {
            e.preventDefault();
            toggleMultiSelectBlock(block);
            return;
          }
          e.preventDefault();
          selectBlock(block);
          return;
        }
      }
    }
    if (e.target === body) {
      deselectBlocks();
      const last = body.lastElementChild;
      if (last) {
        const t = last.tagName.toLowerCase();
        if (['p','div','h1','h2','h3','h4','h5','h6','blockquote'].includes(t)) {
          placeCaretIn(last, false);
        } else {
          const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); placeCaretIn(p, true);
        }
      } else {
        const p = document.createElement('p'); p.innerHTML = '<br>'; body.appendChild(p); placeCaretIn(p, true);
      }
      updateFloatingUi();
      return;
    }
  });
  window.addEventListener('scroll', ()=>{
    updateFloatingUi();
    const fig = document.querySelector('.draft-editable figure.image-block.selected');
    if (fig) positionImageToolbar(fig);
    const block = document.querySelector('.draft-editable > .selected');
    if (block) positionBlockToolbar(block);
    const selected = body.querySelectorAll('.draft-editable > .selected');
    if (selected.length > 1) positionMultiToolbar(selected[0]);
    const tfig = document.querySelector('.draft-editable figure.table-block.selected');
    if (tfig) positionTableToolbar(tfig);
  });
  window.addEventListener('resize', ()=>{
    updateFloatingUi();
    const fig = document.querySelector('.draft-editable figure.image-block.selected');
    if (fig) positionImageToolbar(fig);
    const block = document.querySelector('.draft-editable > .selected');
    if (block) positionBlockToolbar(block);
    const selected = body.querySelectorAll('.draft-editable > .selected');
    if (selected.length > 1) positionMultiToolbar(selected[0]);
    const tfig = document.querySelector('.draft-editable figure.table-block.selected');
    if (tfig) positionTableToolbar(tfig);
  });
  renderInlineTags();
  populateFontLibrary();
  if (highlightCustom) setColorSwatch('highlight', highlightCustom.value || '#ffea55');
  if (foregroundCustom) setColorSwatch('foreground', foregroundCustom.value || '#1d1b18');
  syncPlusIcon();
  canonicalizeLegacyImageNodes();
  refreshImageBlocks();
  body.querySelectorAll('pre.code-block').forEach(pre => { ensureCodeBlockToolbar(pre); });
  normalizeMediaUrls();
  history.push('load');
  setSaveState('is-saved', 'Saved');
  setInterval(()=>{ if (dirty) saveDraft(); }, 5000);
})();
</script>
<script src="/media/js/main.js"></script>
<script src="/media/js/theme-switcher.js"></script>
<script src="/media/js/search.js"></script>
</body>
<script src="/media/js/claps.js"></script>
</html>
